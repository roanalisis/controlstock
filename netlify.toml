[build]
  command   = "npm run build"
  publish   = "dist"

# Variables de entorno disponibles en build time
# Definirlas en Netlify UI → Site configuration → Environment variables
# VITE_API_URL = https://controlstock-api.onrender.com

# SPA fallback: todas las rutas apuntan al index.html de React
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
